<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maps-Bingo</title>
<style>
  :root{
    --bg:#14130e; --surface:#1e1c15; --surface2:#262318;
    --line:#3a3526; --text:#f1ece0; --muted:#9a9384;
    --amber:#e9a23b; --amber-dim:#7a5a1f;
    --found:#5dcaa5; --found-bg:#16302a; --found-line:#2c5c4f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh; padding:20px 16px 48px;}
  .wrap{max-width:540px; margin:0 auto;}
  .top{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:4px;}
  h1{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-size:22px; font-weight:600; letter-spacing:0.08em; margin:0;}
  h1 .dot{color:var(--amber);}
  .count{font-family:ui-monospace,monospace; font-size:13px; color:var(--muted); white-space:nowrap;}
  .count.win{color:var(--found); font-weight:600;}
  .codebar{display:flex; gap:8px; align-items:center; margin:14px 0 16px;
    background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:8px 10px; flex-wrap:wrap;}
  .codebar label{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em;}
  .codebar input{flex:1; min-width:90px; background:var(--surface2); border:1px solid var(--line);
    color:var(--amber); font-family:ui-monospace,monospace; font-size:16px; font-weight:600;
    letter-spacing:0.12em; padding:7px 10px; border-radius:7px; text-transform:uppercase; outline:none;}
  .codebar input:focus{border-color:var(--amber-dim);}
  button{background:var(--surface2); color:var(--text); border:1px solid var(--line);
    font-size:14px; padding:8px 12px; border-radius:7px; cursor:pointer; font-family:inherit; transition:background .12s, border-color .12s;}
  button:hover{background:#322e20; border-color:var(--amber-dim);}
  button:active{transform:scale(.97);}
  button.accent{color:var(--amber); border-color:var(--amber-dim);}
  .status{font-size:12px; margin:-8px 0 14px; text-align:center; height:16px; color:var(--muted);}
  .status .online{color:var(--found);}
  .status .local{color:var(--amber);}
  .grid{display:grid; grid-template-columns:repeat(5,1fr); gap:6px;}
  .cell{aspect-ratio:1; display:flex; align-items:center; justify-content:center; text-align:center;
    padding:5px 4px; font-size:11px; line-height:1.22; border:1px solid var(--line);
    border-radius:8px; background:var(--surface); color:var(--text); cursor:pointer;
    transition:background .12s, border-color .12s, color .12s; user-select:none;}
  .cell:hover{border-color:var(--amber-dim);}
  .cell.on{background:var(--found-bg); border-color:var(--found-line); color:var(--found); font-weight:600;}
  .cell.win{background:#1d4d40; border-color:var(--found); color:#bff0e2; font-weight:600;}
  .cell.free{background:var(--surface2); color:var(--amber); font-weight:600; cursor:default; letter-spacing:0.05em;}
  .cell.free:hover{border-color:var(--line);}
  .banner{margin:16px 0 0; text-align:center; font-family:ui-monospace,monospace; font-size:18px;
    font-weight:600; letter-spacing:0.15em; color:var(--found); height:24px; opacity:0; transition:opacity .2s;}
  .banner.show{opacity:1;}
  .hint{margin-top:18px; font-size:12.5px; line-height:1.6; color:var(--muted); text-align:center;}
  .hint b{color:var(--text); font-weight:600;}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:var(--amber); color:#1a1408; font-size:13px; font-weight:600; padding:9px 16px;
    border-radius:8px; opacity:0; transition:opacity .2s, transform .2s; pointer-events:none;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>MAPS<span class="dot">·</span>BINGO</h1>
    <div class="count" id="count">0 / 24</div>
  </div>
  <div class="codebar">
    <label for="code">Raum</label>
    <input id="code" maxlength="6" spellcheck="false" autocomplete="off">
    <button id="share" class="accent">Teilen</button>
    <button id="new">Neu</button>
  </div>
  <div class="status" id="statusbar"></div>
  <div class="grid" id="grid"></div>
  <div class="banner" id="banner">BINGO!</div>
  <p class="hint">
    Gleicher <b>Raum-Code</b> = gemeinsames Brett. Hakt einer ab, sieht's der andere sofort.
    Alle 24 voll &rarr; <b>Komplett</b>.
  </p>
</div>
<div class="toast" id="toast"></div>

<script type="module">
/* ─────────────────────────────────────────────────────────────
   HIER DEINE FIREBASE-DATEN EINTRAGEN (siehe Anleitung im Chat).
   Solange hier "DEIN_..." steht, läuft das Spiel im lokalen Modus
   (kein Sync). Sobald die echten Werte drin sind, synchronisiert es.
   ───────────────────────────────────────────────────────────── */
const FIREBASE_CONFIG = {
  apiKey: "DEIN_API_KEY",
  authDomain: "DEIN_PROJEKT.firebaseapp.com",
  databaseURL: "https://DEIN_PROJEKT-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "DEIN_PROJEKT"
};

const POOL = [
  // ── Menschen ──
  "Person mit gelbem T-Shirt","Person mit Hut","Person mit Regenschirm","Person mit Sonnenbrille",
  "Person mit Einkaufstüten","Jemand winkt in die Kamera","Jemand telefoniert","Person mit Kinderwagen",
  "Jogger / Läufer","Straßenmusiker","Skateboarder","Bauarbeiter mit Helm","Person auf einer Bank",
  "Verwischtes Gesicht","Paar Hand in Hand","Person in Warnweste","Postbote / Lieferant","Kind mit Ballon",
  "Person im Anzug","Person mit rotem Mantel","Person mit Fahrradhelm","Gruppe von Touristen",
  "Person mit Fotoapparat","Jemand isst etwas","Person mit Kaffeebecher","Person mit Rucksack",
  "Person mit Rollkoffer","Kellner / Kellnerin","Person auf einer Leiter","Jemand mit Eis in der Hand",
  "Person mit Zeitung","Kinder beim Spielen","Person mit Tretroller","Spaziergänger mit Gehstock",
  "Person mit Blumenstrauß","Person die Fenster putzt","Brautpaar","Jemand mit Hund auf dem Arm",
  // ── Fahrzeuge ──
  "Bus oder Tram","Polizeiauto","Krankenwagen","Feuerwehrauto","Cabrio","Vespa / Roller","Müllwagen",
  "Traktor","Taxi","DHL- / Paketwagen","Wohnmobil","Oldtimer","Motorrad","Fahrrad an einer Wand",
  "Leih-E-Scooter","Gelbes Auto","Baukran","Bagger","Ladesäule für E-Autos","Schulbus","Reisebus",
  "Lastenrad","VW-Bulli / Camper","Sportwagen","Mähdrescher","Betonmischer","Abschleppwagen","Gabelstapler",
  "Boot oder Yacht","Zug am Bahnhof","U-Bahn-Eingang","Eiswagen","Foodtruck","Bratwurst-Imbisswagen",
  "Auto mit Dachträger","Autoschlange / Stau","Pferdekutsche","Quad","Wohnwagen-Anhänger","Polizeimotorrad",
  // ── Tiere ──
  "Hund an der Leine","Katze auf der Straße","Taube oder Möwe","Ente oder Schwan","Pferd","Kühe oder Schafe",
  "Vogelschwarm","Eichhörnchen","Hühner","Ziegen","Esel","Hund im Auto","Storchennest","Reh am Feldrand",
  "Vogel im Flug","Hund schaut in die Kamera",
  // ── Läden & Logos ──
  "Tankstelle","Apotheke-Schild","Döner- / Pizzaladen","Eisdiele","Café mit Sonnenschirm","Fast-Food-Logo",
  "Bäckerei","Supermarkt-Logo","Friseur","Großes Werbeplakat","Leuchtreklame","Blumenladen","Hotelschild",
  "Bankfiliale / Automat","Buchhandlung","Optiker","Juwelier","Tattoo-Studio","Fitnessstudio","Waschsalon",
  "Kiosk","Metzgerei","Weinhandlung","Kneipe / Pub","Sushi- oder Asia-Lokal","Autohaus","Baumarkt","Drogerie",
  "Möbelhaus","Coca-Cola-Werbung","Speisekarte vor dem Lokal","Kino-Schild","Theater oder Oper","Museum-Schild",
  "Reisebüro",
  // ── Schilder & Schrift ──
  "Ortsschild","Einbahnstraßen-Schild","Tempo-30-Schild","Stoppschild","Vorfahrt-Schild","Sackgassen-Schild",
  "Parkverbot-Schild","Fußgängerzonen-Schild","Autobahnschild","Braunes Touristen-Schild","Straßennamen-Schild",
  "Wahlplakat","Konzert-Plakat","\"Zu verkaufen\"-Schild","Schild in fremder Schrift","Wegweiser mit Entfernungen",
  "Verkehrsspiegel",
  // ── Stadt & Infrastruktur ──
  "Roter Briefkasten","Brunnen","Statue / Denkmal","Ampel auf Rot","Kirchturm","Graffiti / Streetart",
  "Wandbild / Mural","Telefonzelle","Bushaltestelle","Hydrant","Mülltonnen-Reihe","Fahnenmast mit Flagge",
  "Windrad","Brücke","Bahnübergang","Spielplatz","Zebrastreifen","Litfaßsäule","Parkbank",
  "Historische Straßenlaterne","Uhr auf einem Turm","Kriegerdenkmal","Öffentlicher Bücherschrank",
  "Bemalter Stromkasten","Poller / Absperrpfosten","Schranke","Tunnel oder Unterführung","Freitreppe",
  "Aussichtsturm","Wasserturm","Leuchtturm","Windmühle","Kapelle","Friedhof","Stadttor / Stadtmauer",
  "Burg oder Schloss","Ruine","Gewächshaus","Solaranlage auf dem Dach","Fabrikschornstein","Kühlturm",
  "Hochspannungsmast","Funk- / Sendeturm","Blitzer / Radarfalle","Gleise / Schienen","Hafenkran","Steg am Wasser",
  "Basketballkorb","Fußballtor","Freibad","Riesenrad","Bauzaun / Absperrband","Pylonen-Reihe (Hütchen)",
  // ── Natur & Szenerie ──
  "Großer einzelner Baum","See oder Teich","Berg im Hintergrund","Weinberg oder Feld","Palmen","Sonnenblumenfeld",
  "Rapsfeld (gelb)","Heuballen auf dem Feld","Allee (Baumreihe)","Park mit Wiese","Blumenkästen am Fenster",
  "Efeubewachsenes Haus","Gartenzwerg","Schrebergarten","Wasserfall","Bach oder Fluss","Strand",
  "Felsen / Steilküste","Schneebedeckte Berge","Regenbogen","Heißluftballon","Storch auf dem Dach",
  "Kürbisstand (Herbst)",
  // ── Glückstreffer & Specials ──
  "Spiegelung des Kamera-Autos","Schatten des Kamera-Autos","Anderes Street-View-Auto","Flugzeug am Himmel",
  "Wäsche auf der Leine","Baugerüst am Haus","Marktstand / Obststand","Kopfsteinpflaster-Gasse","Person im Kostüm",
  "Maskottchen / Figur","Einkaufswagen allein","Sperrmüll am Straßenrand","Weihnachtsbeleuchtung",
  "Trampolin im Garten","Pool im Garten","Wochenmarkt mit Ständen","Flohmarkt","Straßenfest / Bühne",
  "Drachen am Himmel","Liegestuhl draußen","Vogelhäuschen"
];
const FREE = 12;

function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function randCode(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let s="";const r=mulberry32(hashStr(Date.now()+""+Math.random()));for(let i=0;i<4;i++)s+=c[Math.floor(r()*c.length)];return s;}

let code="", board=[], marked=new Set();
let db=null, online=false, roomRef=null, unsub=null, fb=null;
const grid=document.getElementById('grid'), countEl=document.getElementById('count'),
      banner=document.getElementById('banner'), codeInput=document.getElementById('code'),
      statusbar=document.getElementById('statusbar');

const lines=[];
for(let r=0;r<5;r++)lines.push([0,1,2,3,4].map(c=>r*5+c));
for(let c=0;c<5;c++)lines.push([0,1,2,3,4].map(r=>r*5+c));
lines.push([0,6,12,18,24]); lines.push([4,8,12,16,20]);

function buildBoard(seed){
  const r=mulberry32(hashStr("bingo:"+seed));
  const idx=[...POOL.keys()];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  const pick=idx.slice(0,24); const cells=[]; let p=0;
  for(let i=0;i<25;i++) cells.push(i===FREE?"GRATIS":POOL[pick[p++]]);
  return cells;
}
function winCells(){const w=new Set();for(const l of lines)if(l.every(i=>marked.has(i)))l.forEach(i=>w.add(i));return w;}

function render(){
  const win=winCells(); grid.innerHTML="";
  board.forEach((text,i)=>{
    const d=document.createElement('div');
    const free=i===FREE, on=marked.has(i), inWin=win.has(i);
    d.className="cell"+(free?" free":"")+(inWin?" win":(on?" on":""));
    d.textContent=text;
    if(!free)d.onclick=()=>toggle(i);
    grid.appendChild(d);
  });
  const found=marked.size-1, full=found>=24, hasWin=win.size>0;
  countEl.textContent=found+" / 24"; countEl.classList.toggle("win",hasWin||full);
  banner.textContent=full?"KOMPLETT!":"BINGO!";
  banner.classList.toggle("show",hasWin||full);
}

function toggle(i){
  const on=!marked.has(i);
  if(online){ fb.update(fb.ref(db,"rooms/"+code+"/marked"),{[i]: on?true:null}); }
  else { on?marked.add(i):marked.delete(i); saveLocal(); render(); }
}
function saveLocal(){try{localStorage.setItem("bingo:"+code,JSON.stringify([...marked]));}catch(e){}}
function loadLocal(){try{const v=localStorage.getItem("bingo:"+code);return v?new Set(JSON.parse(v)):new Set([FREE]);}catch(e){return new Set([FREE]);}}

function listen(){
  if(unsub)unsub();
  roomRef=fb.ref(db,"rooms/"+code+"/marked");
  unsub=fb.onValue(roomRef,snap=>{
    const v=snap.val()||{};
    marked=new Set(Object.keys(v).filter(k=>v[k]).map(Number));
    marked.add(FREE); render();
  });
  fb.update(fb.ref(db,"rooms/"+code+"/marked"),{[FREE]:true});
}

function setCode(c){
  c=(c||"").toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,6);
  if(!c)c=randCode();
  code=c; codeInput.value=c; board=buildBoard(code);
  try{history.replaceState(null,"","#"+code);}catch(e){}
  if(online){ listen(); }
  else { marked=loadLocal(); if(!marked.has(FREE))marked.add(FREE); render(); }
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}

codeInput.addEventListener('change',()=>setCode(codeInput.value));
codeInput.addEventListener('keydown',e=>{if(e.key==='Enter')codeInput.blur();});
document.getElementById('new').onclick=()=>{if(confirm("Neuen Raum öffnen? Schick der anderen den neuen Code."))setCode(randCode());};
document.getElementById('share').onclick=async()=>{
  const base=location.href.split('#')[0];
  const msg="Lass uns Maps-Bingo spielen! Raum: "+code+"\n"+base+"#"+code;
  try{await navigator.clipboard.writeText(msg);toast("Einladung kopiert");}
  catch(e){prompt("Kopiere diese Einladung:",msg);}
};

async function boot(){
  const configured=!FIREBASE_CONFIG.apiKey.startsWith("DEIN_");
  if(configured){
    try{
      const appMod=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const dbMod=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
      const app=appMod.initializeApp(FIREBASE_CONFIG);
      db=dbMod.getDatabase(app);
      fb={ref:dbMod.ref,onValue:dbMod.onValue,update:dbMod.update,set:dbMod.set};
      online=true;
      statusbar.innerHTML='<span class="online">● synchronisiert</span>';
    }catch(e){
      online=false;
      statusbar.innerHTML='<span class="local">● lokaler Modus (Verbindung fehlgeschlagen)</span>';
    }
  } else {
    statusbar.innerHTML='<span class="local">● lokaler Modus – Firebase-Config eintragen für Sync</span>';
  }
  setCode(location.hash.replace('#','') || "");
}
boot();
</script>
</body>
</html>
